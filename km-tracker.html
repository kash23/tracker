<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KM Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1a1a24;
    --accent: #00e5a0;
    --accent2: #00b8ff;
    --warn: #ff5e5e;
    --text: #f0f0f5;
    --muted: #6b6b80;
    --border: rgba(255,255,255,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 420px;
    margin: 0 auto;
    width: 100%;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: 0 0 40px;
  }

  header {
    padding: 20px 20px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logo {
    font-family: 'Syne Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 2px;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s, box-shadow 0.3s;
  }
  .status-dot.active {
    background: var(--accent);
    box-shadow: 0 0 0 4px rgba(0,229,160,0.2);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 4px rgba(0,229,160,0.2); }
    50% { box-shadow: 0 0 0 8px rgba(0,229,160,0.05); }
  }

  .km-display {
    text-align: center;
    padding: 28px 20px 16px;
  }

  .km-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .km-value {
    font-family: 'Syne Mono', monospace;
    font-size: 80px;
    font-weight: 800;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -4px;
  }

  .km-unit {
    font-family: 'Syne Mono', monospace;
    font-size: 20px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-top: 4px;
  }

  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    padding: 0 20px;
    margin-bottom: 16px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 10px;
    text-align: center;
  }

  .stat-value {
    font-family: 'Syne Mono', monospace;
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .timer-display {
    font-family: 'Syne Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    padding: 0 20px 14px;
    letter-spacing: 2px;
  }

  .timer-display.running { color: var(--accent); }

  .route-visual {
    margin: 0 20px 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    height: 150px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .route-visual::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 30% 70%, rgba(0,229,160,0.07) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 30%, rgba(0,184,255,0.07) 0%, transparent 60%);
  }

  #routeCanvas {
    width: 100%;
    height: 100%;
    position: absolute;
  }

  .route-empty {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
    position: relative;
    z-index: 1;
    text-align: center;
  }

  .route-empty .icon {
    font-size: 26px;
    display: block;
    margin-bottom: 8px;
    opacity: 0.4;
  }

  .gps-bar {
    margin: 0 20px 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 16px;
    align-items: center;
    gap: 10px;
    display: none;
  }

  .gps-bar.visible { display: flex; }

  .gps-text {
    flex: 1;
    font-size: 11px;
    color: var(--muted);
  }

  .gps-accuracy {
    font-family: 'Syne Mono', monospace;
    font-size: 12px;
    color: var(--accent);
  }

  .controls {
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .btn-main {
    width: 100%;
    padding: 18px;
    border-radius: 18px;
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .btn-main:active { transform: scale(0.97); }

  .btn-start {
    background: linear-gradient(135deg, var(--accent) 0%, #00c87a 100%);
    color: #000;
    box-shadow: 0 8px 28px rgba(0,229,160,0.3);
  }

  .btn-stop {
    background: linear-gradient(135deg, var(--warn) 0%, #e03030 100%);
    color: #fff;
    box-shadow: 0 8px 28px rgba(255,94,94,0.3);
  }

  .btn-secondary {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 14px;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
  }

  .btn-secondary:active { background: #1f1f2d; color: var(--text); }

  .history-section {
    padding: 20px 20px 0;
  }

  .section-header {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .session-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .session-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .session-date { font-size: 11px; color: var(--muted); }
  .session-duration { font-size: 12px; color: var(--text); margin-top: 3px; }

  .session-km {
    font-family: 'Syne Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
  }

  .session-km span { font-size: 11px; color: var(--muted); font-family: 'Syne', sans-serif; }

  .empty-history {
    text-align: center;
    padding: 20px;
    color: var(--muted);
    font-size: 12px;
  }

  .toast {
    position: fixed;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--card);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 11px 22px;
    border-radius: 100px;
    font-size: 12px;
    letter-spacing: 1px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 100;
    white-space: nowrap;
    font-family: 'Syne Mono', monospace;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">KM · TRACK</div>
    <div class="status-dot" id="statusDot"></div>
  </header>

  <div class="km-display">
    <div class="km-label">distance covered</div>
    <div class="km-value" id="kmValue">0.00</div>
    <div class="km-unit">km</div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-value" id="speedVal">0.0</div>
      <div class="stat-label">km/h</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="maxSpeedVal">0.0</div>
      <div class="stat-label">Max km/h</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="pointsVal">0</div>
      <div class="stat-label">GPS pts</div>
    </div>
  </div>

  <div class="timer-display" id="timerDisplay">00:00:00</div>

  <div class="route-visual">
    <canvas id="routeCanvas"></canvas>
    <div class="route-empty" id="routeEmpty">
      <span class="icon">🛰️</span>
      Press Start to begin tracking
    </div>
  </div>

  <div class="gps-bar" id="gpsBar">
    <span style="font-size:14px">📡</span>
    <span class="gps-text">GPS Accuracy</span>
    <span class="gps-accuracy" id="gpsAccuracy">—</span>
  </div>

  <div class="controls">
    <button class="btn-main btn-start" id="mainBtn" onclick="toggleTracking()">▶ START</button>
    <button class="btn-secondary" onclick="resetSession()">↺ Reset Session</button>
  </div>

  <div class="history-section">
    <div class="section-header">Past Sessions</div>
    <div class="session-list" id="sessionList"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  let isTracking = false;
  let watchId = null;
  let positions = [];
  let totalDistance = 0;
  let currentSpeed = 0;
  let maxSpeed = 0;
  let startTime = null;
  let timerInterval = null;
  let sessions = [];

  try { sessions = JSON.parse(localStorage.getItem('km_sessions') || '[]'); } catch(e) { sessions = []; }

  const kmValueEl = document.getElementById('kmValue');
  const speedEl = document.getElementById('speedVal');
  const maxSpeedEl = document.getElementById('maxSpeedVal');
  const pointsEl = document.getElementById('pointsVal');
  const mainBtn = document.getElementById('mainBtn');
  const statusDot = document.getElementById('statusDot');
  const timerEl = document.getElementById('timerDisplay');
  const routeEmpty = document.getElementById('routeEmpty');
  const gpsBar = document.getElementById('gpsBar');
  const gpsAccEl = document.getElementById('gpsAccuracy');
  const canvas = document.getElementById('routeCanvas');
  const ctx = canvas.getContext('2d');

  function resizeCanvas() {
    const p = canvas.parentElement;
    canvas.width = p.offsetWidth;
    canvas.height = p.offsetHeight;
    drawRoute();
  }
  window.addEventListener('resize', resizeCanvas);
  setTimeout(resizeCanvas, 100);

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function toggleTracking() {
    if (!isTracking) startTracking();
    else stopTracking();
  }

  function startTracking() {
    if (!navigator.geolocation) { showToast('GPS not available'); return; }

    isTracking = true;
    positions = [];
    totalDistance = 0;
    currentSpeed = 0;
    maxSpeed = 0;
    startTime = Date.now();

    mainBtn.textContent = '⏹ STOP';
    mainBtn.className = 'btn-main btn-stop';
    statusDot.classList.add('active');
    timerEl.classList.add('running');
    gpsBar.classList.add('visible');
    routeEmpty.style.display = 'none';

    timerInterval = setInterval(updateTimer, 1000);

    watchId = navigator.geolocation.watchPosition(onPosition, onError, {
      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 15000
    });

    showToast('Tracking started');
  }

  function stopTracking() {
    if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    clearInterval(timerInterval);

    isTracking = false;
    statusDot.classList.remove('active');
    timerEl.classList.remove('running');
    mainBtn.textContent = '▶ START';
    mainBtn.className = 'btn-main btn-start';

    if (totalDistance > 0.005) {
      const session = {
        km: totalDistance,
        duration: Date.now() - startTime,
        date: new Date().toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }),
        time: new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })
      };
      sessions.unshift(session);
      if (sessions.length > 15) sessions = sessions.slice(0, 15);
      try { localStorage.setItem('km_sessions', JSON.stringify(sessions)); } catch(e) {}
      renderSessions();
      showToast('Saved · ' + totalDistance.toFixed(2) + ' km');
    } else {
      showToast('Session too short');
    }
  }

  function onPosition(pos) {
    const { latitude, longitude, speed, accuracy } = pos.coords;
    gpsAccEl.textContent = Math.round(accuracy) + 'm';

    const pt = { lat: latitude, lng: longitude };

    if (positions.length > 0) {
      const last = positions[positions.length - 1];
      const d = haversine(last.lat, last.lng, pt.lat, pt.lng);
      if (d < 0.05) totalDistance += d; // ignore jumps > 50m (GPS noise)
    }

    positions.push(pt);

    if (speed !== null && speed >= 0) {
      currentSpeed = speed * 3.6;
      if (currentSpeed > maxSpeed) maxSpeed = currentSpeed;
    }

    updateUI();
    drawRoute();
  }

  function onError(err) {
    if (err.code === 1) { showToast('Allow GPS in browser settings'); stopTracking(); }
  }

  function haversine(lat1, lng1, lat2, lng2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function updateUI() {
    kmValueEl.textContent = totalDistance.toFixed(2);
    speedEl.textContent = currentSpeed.toFixed(1);
    maxSpeedEl.textContent = maxSpeed.toFixed(1);
    pointsEl.textContent = positions.length;
  }

  function updateTimer() {
    const e = Math.floor((Date.now() - startTime) / 1000);
    const h = String(Math.floor(e/3600)).padStart(2,'0');
    const m = String(Math.floor((e%3600)/60)).padStart(2,'0');
    const s = String(e%60).padStart(2,'0');
    timerEl.textContent = h+':'+m+':'+s;
  }

  function resetSession() {
    if (isTracking) stopTracking();
    totalDistance = 0; currentSpeed = 0; maxSpeed = 0;
    positions = []; startTime = null;
    timerEl.textContent = '00:00:00';
    timerEl.classList.remove('running');
    kmValueEl.textContent = '0.00';
    speedEl.textContent = '0.0';
    maxSpeedEl.textContent = '0.0';
    pointsEl.textContent = '0';
    routeEmpty.style.display = 'flex';
    gpsBar.classList.remove('visible');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    showToast('Reset');
  }

  function drawRoute() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (positions.length < 2) return;

    const lats = positions.map(p => p.lat);
    const lngs = positions.map(p => p.lng);
    const minLat = Math.min(...lats), maxLat = Math.max(...lats);
    const minLng = Math.min(...lngs), maxLng = Math.max(...lngs);
    const pad = 24;
    const W = canvas.width - pad*2, H = canvas.height - pad*2;
    const latR = maxLat - minLat || 0.0001;
    const lngR = maxLng - minLng || 0.0001;
    const scale = Math.min(W/lngR, H/latR);
    const ox = (W - lngR*scale)/2, oy = (H - latR*scale)/2;

    function proj(p) {
      return {
        x: pad + ox + (p.lng - minLng)*scale,
        y: pad + oy + (maxLat - p.lat)*scale
      };
    }

    const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
    grad.addColorStop(0, '#00e5a0');
    grad.addColorStop(1, '#00b8ff');

    ctx.beginPath();
    ctx.strokeStyle = grad;
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    const f = proj(positions[0]);
    ctx.moveTo(f.x, f.y);
    for (let i = 1; i < positions.length; i++) {
      const p = proj(positions[i]);
      ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();

    // Start
    ctx.beginPath(); ctx.arc(f.x, f.y, 5, 0, Math.PI*2);
    ctx.fillStyle = '#00e5a0'; ctx.fill();

    // Current
    const l = proj(positions[positions.length-1]);
    ctx.beginPath(); ctx.arc(l.x, l.y, 8, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,229,160,0.15)'; ctx.fill();
    ctx.beginPath(); ctx.arc(l.x, l.y, 4, 0, Math.PI*2);
    ctx.fillStyle = '#fff'; ctx.fill();
  }

  function fmtDuration(ms) {
    const s = Math.floor(ms/1000);
    const h = Math.floor(s/3600), m = Math.floor((s%3600)/60);
    if (h > 0) return h+'h '+m+'m';
    return m+'m '+(s%60)+'s';
  }

  function renderSessions() {
    const list = document.getElementById('sessionList');
    if (!sessions.length) { list.innerHTML = '<div class="empty-history">No sessions yet</div>'; return; }
    list.innerHTML = sessions.map(s => `
      <div class="session-item">
        <div>
          <div class="session-date">${s.date} · ${s.time}</div>
          <div class="session-duration">${fmtDuration(s.duration)}</div>
        </div>
        <div class="session-km">${s.km.toFixed(2)}<span> km</span></div>
      </div>
    `).join('');
  }

  renderSessions();
</script>
</body>
</html>
